server:
  port: 8083

spring:
  application:
    name: payment-service
  config:
    import: "optional:configserver:http://localhost:8888"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

payment:
  failure-rate: 0.5
  delay-ms: 0